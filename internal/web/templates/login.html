<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DailyRead</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Reuse root styles from index.html for consistency */
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --glass-border: #e2e8f0;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #f8fafc;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); background: #fff; }
        .btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 700;
            background: var(--accent); color: white; cursor: pointer; transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-1px); background: #1d4ed8; }
        .flash { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; font-size: 0.9rem; }
        .flash.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .links { margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); }
        .links a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>DailyRead</h1>
        <p>Log in to your dashboard</p>

        {{if .Flash}}
        <div class="flash {{if .FlashIsError}}error{{end}}">
            {{.Flash}}
        </div>
        {{end}}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Log In</button>
        </form>
        <div class="links">
            Don't have an account? <a href="/register">Sign up</a>
        </div>
    </div>
</body>
</html>
